global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    # Configure webhook, email, slack, etc.
    # webhook_configs:
    #   - url: 'http://control-plane:3000/webhooks/alerts'

  - name: 'critical'
    # webhook_configs:
    #   - url: 'http://control-plane:3000/webhooks/alerts/critical'

  - name: 'warning'
    # webhook_configs:
    #   - url: 'http://control-plane:3000/webhooks/alerts/warning'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']

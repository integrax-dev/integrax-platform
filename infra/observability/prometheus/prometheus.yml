global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============================================
  # IntegraX Services
  # ============================================

  # Control Plane API
  - job_name: 'integrax-control-plane'
    static_configs:
      - targets: ['control-plane:3000']
    metrics_path: /metrics

  # LLM Orchestrator
  - job_name: 'integrax-llm-orchestrator'
    static_configs:
      - targets: ['llm-orchestrator:3001']
    metrics_path: /metrics

  # Temporal Worker
  - job_name: 'integrax-temporal-worker'
    static_configs:
      - targets: ['temporal-worker:9090']
    metrics_path: /metrics

  # Event Router
  - job_name: 'integrax-event-router'
    static_configs:
      - targets: ['event-router:3002']
    metrics_path: /metrics

  # ============================================
  # Infrastructure
  # ============================================

  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Temporal Server
  - job_name: 'temporal'
    static_configs:
      - targets: ['temporal:8000']
    metrics_path: /metrics

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Postgres Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Kafka (JMX Exporter)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:7071']

  # Node Exporter (host metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alerts/*.yml'

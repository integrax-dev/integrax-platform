version: '3.8'

# ============================================
# INTEGRAX ENTERPRISE STACK
# Kafka + Schema Registry + Debezium + Temporal
# ============================================

services:
  # ============================================
  # ZOOKEEPER (Required for Kafka)
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: integrax-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # KAFKA
  # ============================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: integrax-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ============================================
  # SCHEMA REGISTRY (Avro/JSON Schema)
  # ============================================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: integrax-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # KAFKA UI (Visualization)
  # ============================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: integrax-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: integrax
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  # ============================================
  # POSTGRES (for Debezium CDC + Temporal)
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: integrax-postgres-enterprise
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: integrax
      POSTGRES_PASSWORD: integrax
      POSTGRES_DB: integrax
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"  # Required for Debezium CDC
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integrax -d integrax"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # DEBEZIUM (Change Data Capture)
  # ============================================
  debezium:
    image: debezium/connect:2.4
    container_name: integrax-debezium
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: integrax-debezium
      CONFIG_STORAGE_TOPIC: integrax_debezium_configs
      OFFSET_STORAGE_TOPIC: integrax_debezium_offsets
      STATUS_STORAGE_TOPIC: integrax_debezium_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================
  # TEMPORAL (Workflow Orchestration)
  # ============================================
  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: integrax-temporal
    depends_on:
      postgres-temporal:
        condition: service_healthy
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres-temporal
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================
  # TEMPORAL POSTGRES (Separate DB for Temporal)
  # ============================================
  postgres-temporal:
    image: postgres:15-alpine
    container_name: integrax-postgres-temporal
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres-temporal-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # TEMPORAL UI
  # ============================================
  temporal-ui:
    image: temporalio/ui:2.21.0
    container_name: integrax-temporal-ui
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000

  # ============================================
  # REDIS (Caching + MVP compatibility)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: integrax-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # HASHICORP VAULT (Secrets Management)
  # ============================================
  vault:
    image: hashicorp/vault:1.15
    container_name: integrax-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: integrax-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./vault-config:/vault/config
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PROMETHEUS (Metrics)
  # ============================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: integrax-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../observability/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # GRAFANA (Visualization)
  # ============================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: integrax-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: integrax
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../../observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # ALERTMANAGER
  # ============================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: integrax-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ../../observability/alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  postgres-data:
  postgres-temporal-data:
  redis-data:
  vault-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: integrax-enterprise

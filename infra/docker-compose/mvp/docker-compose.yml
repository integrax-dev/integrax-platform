version: '3.8'

services:
  # ===========================================
  # Core Services
  # ===========================================

  postgres:
    image: postgres:16-alpine
    container_name: integrax-postgres
    environment:
      POSTGRES_USER: integrax
      POSTGRES_PASSWORD: integrax
      POSTGRES_DB: integrax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integrax"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - integrax

  redis:
    image: redis:7-alpine
    container_name: integrax-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - integrax

  # ===========================================
  # n8n - Workflow Automation
  # ===========================================

  n8n:
    image: n8nio/n8n:latest
    container_name: integrax-n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Argentina/Buenos_Aires
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=integrax
      - DB_POSTGRESDB_PASSWORD=integrax
      - N8N_METRICS=true
      - N8N_METRICS_PREFIX=n8n_
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - integrax

  # ===========================================
  # Worker - Event Processing
  # ===========================================

  worker:
    build:
      context: ../../../
      dockerfile: workers/ts/Dockerfile
    container_name: integrax-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=integrax
      - POSTGRES_PASSWORD=integrax
      - POSTGRES_DB=integrax
      - WORKER_CONCURRENCY=5
      - LOG_LEVEL=info
      - NODE_ENV=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - integrax

  # ===========================================
  # Observability Stack
  # ===========================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: integrax-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../../../infra/observability/otel-collector/config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
    networks:
      - integrax

  prometheus:
    image: prom/prometheus:latest
    container_name: integrax-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ../../../infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - integrax

  loki:
    image: grafana/loki:latest
    container_name: integrax-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ../../../infra/observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - integrax

  grafana:
    image: grafana/grafana:latest
    container_name: integrax-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../../../infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - integrax

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  integrax:
    driver: bridge
